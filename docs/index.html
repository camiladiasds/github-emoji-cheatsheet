<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Search and copy GitHub markdown emojis" />
  <title>GitHub Emoji Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>GitHub Emoji Explorer</h1>
      <p class="subtitle">Search and copy GitHub markdown emoji shortcodes.</p>
      <p id="total-counter" class="emoji-counter"></p>
    </header>

    <div class="mode-bar">
      <button id="btn-all-emojis" class="mode-btn active">All Emojis</button>
      <button id="btn-commit" class="mode-btn">✨ Commit Emojis</button>
    </div>

    <div class="search-wrap">
      <input
        type="text"
        id="search"
        class="search"
        placeholder="Search emojis..."
        autocomplete="off"
        autofocus
      />
    </div>

    <div id="category-bar" class="category-bar"></div>

    <p id="count" class="count"></p>
    <div id="grid" class="grid"></div>
    <div id="toast" class="toast"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
