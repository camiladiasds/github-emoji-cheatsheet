<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Emoji Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>GitHub Emoji Explorer</h1>
    <p class="subtitle">Click any emoji to copy its shortcode</p>
    <input
      type="text"
      id="search"
      class="search"
      placeholder="Search emojis..."
      autocomplete="off"
    />
    <p id="count" class="count"></p>
    <div id="grid" class="grid"></div>
    <div id="toast" class="toast">Copied!</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
